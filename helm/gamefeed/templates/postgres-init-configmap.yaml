{{- if and .Values.postgres.enabled .Values.postgres.initdb.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-script
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "gamefeed.labels" . | nindent 4 }}
data:
  init-db.sh: |
{{ .Values.postgres.initdb.script | indent 4 }}
{{- end }}
