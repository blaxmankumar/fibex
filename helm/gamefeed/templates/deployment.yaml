{{- range $name, $svc := .Values.services }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  namespace: {{ $.Values.namespace }}
  labels:
    app: {{ $name }}
    {{- include "gamefeed.labels" $ | nindent 4 }}
spec:
  replicas: {{ $svc.replicas }}
  selector:
    matchLabels:
      app: {{ $name }}
  template:
    metadata:
      labels:
        app: {{ $name }}
        {{- include "gamefeed.labels" $ | nindent 8 }}
    spec:
      containers:
        - name: {{ $name }}
          image: "{{ $.Values.image.registry }}/{{ $svc.imageName }}:{{ $.Values.image.tag }}"
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ $svc.port }}
          env:
            {{- range $key, $value := $svc.env }}
            - name: {{ $key }}
              {{- if eq $key "SPRING_DATASOURCE_PASSWORD" }}
              valueFrom:
                secretKeyRef:
                  name: gamefeed-secret
                  key: POSTGRES_PASSWORD
              {{- else if eq $key "JWT_SECRET" }}
              valueFrom:
                secretKeyRef:
                  name: gamefeed-secret
                  key: JWT_SECRET
              {{- else }}
              value: {{ $value | quote }}
              {{- end }}
            {{- end }}
---
{{- end }}
