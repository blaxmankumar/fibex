apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: gamefeed
  labels:
    app: api-gateway
spec:
  type: ClusterIP
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: gamefeed
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      initContainers:
        - name: wait-for-backend-services
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z user-service 8081; do echo waiting for user-service; sleep 3; done
              until nc -z game-service 8082; do echo waiting for game-service; sleep 3; done
              until nc -z review-service 8083; do echo waiting for review-service; sleep 3; done
              until nc -z comment-service 8084; do echo waiting for comment-service; sleep 3; done
      containers:
        - name: api-gateway
          image: battulalaxmankumar04/api-gateway:
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: gamefeed-config
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 12
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 6
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 700m
              memory: 768Mi
