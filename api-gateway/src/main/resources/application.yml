server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns:
              - "http://localhost:*"
              - "http://127.0.0.1:*"
            allowedHeaders: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowCredentials: true
      routes:
        - id: user-service-route
          uri: ${USER_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/users/**
        - id: game-service-route
          uri: ${GAME_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/games/**
        - id: review-service-route
          uri: ${REVIEW_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/reviews/**
        - id: comment-service-route
          uri: ${COMMENT_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/comments/**

logging:
  level:
    org.springframework.cloud.gateway: INFO
    org.springframework.web: INFO
