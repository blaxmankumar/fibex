apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gamefeed-services
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/blaxmankumar/fibex.git
    targetRevision: main
    path: helm/gamefeed-services
    helm:
      valueFiles:
        - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: gamefeed

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
